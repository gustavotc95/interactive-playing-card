<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta de baralho interativa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2 class="sr-only">Carta de baralho interativa: toque para virar, arraste para mover.</h2>

  <div class="stage">
    <div class="hint">toque pra virar · arraste pra mover</div>

    <div id="cw" class="card-wrapper">
      <div id="ci" class="card-inner">
        <div class="card-face card-front">
          <svg viewBox="0 0 120 170" width="120" height="170">
            <rect x="2" y="2" width="116" height="166" rx="10" ry="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
            <text x="12" y="26" font-size="20" font-weight="bold" fill="#1A1A1A" font-family="Georgia, serif">A</text>
            <text x="12" y="44" font-size="16" fill="#1A1A1A">♠</text>
            <text x="60" y="108" font-size="64" fill="#1A1A1A" text-anchor="middle">♠</text>
            <g transform="rotate(180 60 85)">
              <text x="12" y="26" font-size="20" font-weight="bold" fill="#1A1A1A" font-family="Georgia, serif">A</text>
              <text x="12" y="44" font-size="16" fill="#1A1A1A">♠</text>
            </g>
          </svg>
        </div>
        <div class="card-face card-back">
          <svg viewBox="0 0 120 170" width="120" height="170">
            <defs>
              <pattern id="dp" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
                <path d="M7 1 L13 7 L7 13 L1 7 Z" fill="#8B1A1A"/>
                <path d="M7 4 L10 7 L7 10 L4 7 Z" fill="#D4AF37" opacity="0.35"/>
              </pattern>
            </defs>
            <rect x="2" y="2" width="116" height="166" rx="10" ry="10" fill="#6B0F0F"/>
            <rect x="8" y="8" width="104" height="154" rx="6" ry="6" fill="url(#dp)"/>
            <rect x="8" y="8" width="104" height="154" rx="6" ry="6" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
