<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta de baralho interativa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2 class="sr-only">Mão de cartas interativa: arraste cartas para a mesa, toque para virar.</h2>

  <div class="stage">
    <div class="hint">arraste pra mesa · toque pra virar</div>

    <div id="drop-zone" class="drop-zone">
      <span class="drop-label">mesa</span>
    </div>

    <div id="hand" class="hand"></div>
  </div>

  <div class="controls">
    <button id="btn-minus" type="button" aria-label="Remover carta">−</button>
    <span class="count"><span id="hand-count">5</span> cartas</span>
    <button id="btn-plus" type="button" aria-label="Adicionar carta">+</button>
    <button id="btn-reset" type="button" class="btn-reset">Nova mão</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
